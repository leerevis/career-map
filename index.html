<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device=width, initial-scale=1.0">
    <title>Lee Revis - Career Map</title>
    <script src="data.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Outfit', sans-serif;
        }
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; }
        #map { background: #ffffff; }
        #panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 320px;
            height: 100vh;
            background: white;
            z-index: 1000;
            overflow-y: auto;
            border-right: 1px solid #ddd;
        }

        #panel-header {
            padding: 24px;
            border-bottom: 1px solid #ddd;
        }

        #panel-header h1 {
            font-size: 22px;
            margin-bottom: 4px;
        }

        #panel-header p {
            font-size: 13px;
            color: #888;
        }
                .timeline-item {
            padding: 16px 24px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }

        .timeline-item:hover {
            background: #fff8ee;
            border-left: 3px solid #C8972A;
        }

        .timeline-date {
            font-size: 11px;
            color: #C8972A;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .timeline-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .timeline-org {
            font-size: 12px;
            color: #888;
        }
    </style>
</head>

<body>
<div id="panel">
    <div id="panel-header">
        <h1>Lee Revis</h1>
        <p>Humanitarian Information Management</p>
    </div>
    <div id="timeline"></div>
</div>
<div id="map"></div>
<script>
    const map = L.map('map').setView([30, 10], 2);

    // ── FORMAT DATE ──────────────────────────────────────────────
    function formatDate(dateStr) {
        const [year, month] = dateStr.split('-');
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return months[parseInt(month) - 1] + ' ' + year;
    }

    // ── ACHIEVEMENT PINS ─────────────────────────────────────────
    let currentMarkers = [];

    function showAchievements(role) {
        currentMarkers.forEach(m => map.removeLayer(m));
        currentMarkers = [];
        role.achievements.forEach(a => {
            const marker = L.marker([a.lat, a.lng])
                .addTo(map)
                .bindPopup(`<b>${a.label}</b><br><strong>${a.stat}</strong><br>${a.desc}`);
            currentMarkers.push(marker);
        });
    }

    // ── TIMELINE ─────────────────────────────────────────────────
    function buildTimeline() {
        const container = document.getElementById('timeline');
        const sorted = [...careerData.roles].sort((a, b) => b.start.localeCompare(a.start));
        sorted.forEach(role => {
            const item = document.createElement('div');
            item.className = 'timeline-item';
            item.innerHTML = `
                <div style="display:flex; align-items:center; gap:12px; padding:4px 0;">
                    <div style="width:40px; height:40px; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                        <img src="${role.logo}" style="max-width:40px; max-height:40px; object-fit:contain;">
                    </div>
                    <div>
                        <div class="timeline-date">${formatDate(role.start)} – ${formatDate(role.end)}</div>
                        <div class="timeline-title">${role.title}</div>
                        <div class="timeline-org">${role.org}</div>
                    </div>
                </div>
            `;
            item.onclick = () => {
                map.flyTo(role.center, role.zoom, { duration: 1.5 });
                showAchievements(role);
            };
            container.appendChild(item);
        });
    }

    buildTimeline();

    // ── CHOROPLETH ───────────────────────────────────────────────
    fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
        .then(response => response.json())
        .then(data => {
            L.geoJSON(data, {
                style: function(feature) {
                    const name = feature.properties.name;
                    const location = careerData.locations.find(l => l.name === name);
                    if (!location) return { fillColor: '#e8e8e8', fillOpacity: 1, weight: 0.5, color: '#ccc' };
                    if (location.tier === 'deployed')          return { fillColor: '#C8972A', fillOpacity: 0.8, weight: 1, color: '#E8B84B' };
                    if (location.tier === 'remote-deployment') return { fillColor: '#C8972A', fillOpacity: 0.5, weight: 1, color: '#E8B84B' };
                    if (location.tier === 'remote-support')    return { fillColor: '#C8972A', fillOpacity: 0.2, weight: 1, color: '#E8B84B' };
                    return { fillColor: '#e8e8e8', fillOpacity: 1, weight: 0.5, color: '#ccc' };
                }
            }).addTo(map);
        });
</script>
</body>

</html>
